name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build release distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check version matches release tag
        # Nothing else stops a release tag from shipping whatever version
        # pyproject.toml happens to contain (e.g. 0.2.0.dev0).
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$tag" != "$version" ]; then
            echo "::error::pyproject.toml version ${version} does not match release tag ${GITHUB_REF_NAME}"
            exit 1
          fi
      - name: Build and check distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish release distributions
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bg3forge
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          name: release-dists
          path: dist/
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

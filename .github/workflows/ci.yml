name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (all extras)
        run: python -m pip install -e ".[all,dev]"

      - name: Test
        run: python -m pytest -q

  test-no-deps:
    # The core library must work with zero optional runtime dependencies
    # and should fall back to the pure-Python LZ4 implementation.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (core only + pytest)
        run: |
          python -m pip install -e .
          python -m pip install pytest

      - name: Test
        run: python -m pytest -q

  package:
    # Exercise exactly what the release workflow will publish. This keeps
    # packaging drift from being discovered only after a GitHub release.
    name: Build and smoke-test distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install packaging tools
        run: python -m pip install --upgrade build twine

      - name: Build and check distributions
        run: |
          python -m build
          python -m twine check dist/*

      - name: Verify wheel metadata and contents
        run: python scripts/check_release_artifact.py dist/*.whl

      - name: Smoke-test the built wheel
        run: |
          python -m venv .release-smoke
          .release-smoke/bin/python -m pip install --no-deps dist/*.whl
          .release-smoke/bin/bg3forge --version
          .release-smoke/bin/python -c "from bg3forge import Game; print(Game.__name__)"

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (all extras)
        run: python -m pip install -e ".[all,dev]"

      - name: Test
        run: python -m pytest -q

  test-no-deps:
    # The core library must work with zero optional runtime dependencies
    # and should fall back to the pure-Python LZ4 implementation.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (core only + pytest)
        run: |
          python -m pip install -e .
          python -m pip install pytest

      - name: Test
        run: python -m pytest -q
